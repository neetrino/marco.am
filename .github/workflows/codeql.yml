# Advanced CodeQL (this workflow). If upload fails with:
#   "CodeQL analyses from advanced configurations cannot be processed when the
#   default setup is enabled"
# disable CodeQL default setup so this workflow can upload SARIF:
#   Repo → Settings → Security → Advanced Security → Code security →
#   next to "CodeQL analysis" open the ⋮ menu → Disable CodeQL (then rely on
#   this workflow only), or Switch to advanced if offered.
# https://docs.github.com/en/code-security/reference/code-scanning/sarif-files/troubleshoot-sarif-uploads/default-setup-enabled
name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
