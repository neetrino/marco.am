# Advanced CodeQL (this workflow). GitHub rejects uploaded SARIF if repository
# "Default setup" for code scanning is still enabled — disable it first:
# Repo → Settings → Code security → Code scanning → set up / Configure
# → use Advanced (Actions) only, or turn off default before relying on this job.
# https://docs.github.com/en/code-security/code-scanning/enabling-code-scanning/configuring-default-setup-for-code-scanning
name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
